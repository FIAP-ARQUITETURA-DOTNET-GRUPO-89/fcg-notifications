apiVersion: apps/v1
kind: Deployment

metadata:
  name: fcg-notifications-api
  namespace: fcg-platform

  labels:
    app.kubernetes.io/name: fcg-notifications-api
    app.kubernetes.io/instance: fcg-notifications-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: fcg-platform
    app.kubernetes.io/managed-by: kubectl

spec:
  replicas: 2

  revisionHistoryLimit: 5

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  selector:
    matchLabels:
      app.kubernetes.io/name: fcg-notifications-api

  template:
    metadata:
      labels:
        app.kubernetes.io/name: fcg-notifications-api
        app.kubernetes.io/instance: fcg-notifications-api
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: fcg-platform

    spec:
      containers:
        - name: fcg-notifications-api
          image: camilamachado22/fcg-notifications-api:1.0.0-preview.2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 7020
          envFrom:
            - configMapRef:
                name: fcg-notifications-api-config
            - secretRef:
                name: fcg-notifications-api-secret
          env:
            # Define se as migrations do EF Core serão executadas no startup da aplicação
            - name: RUN_MIGRATION
              value: "false"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          livenessProbe:
            httpGet:
              path: /health
              port: 7020
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /ready
              port: 7020
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
