apiVersion: v1
kind: ConfigMap

metadata:
  name: fcg-notifications-worker-config
  namespace: fcg-platform

  labels:
    app.kubernetes.io/name: fcg-notifications-worker
    app.kubernetes.io/instance: fcg-notifications-worker
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: fcg-platform
    app.kubernetes.io/managed-by: kubectl

data:
  ASPNETCORE_ENVIRONMENT: "Production"
  Serilog__MinimumLevel__Default: "Debug"
  Serilog__MinimumLevel__Override__Microsoft: "Warning"
  Serilog__MinimumLevel__Override__System: "Warning"
  Serilog__Properties__ApplicationName: "FcgNotifications.Worker"
  MassTransit__RetryLimit: "5"
  MassTransit__MinIntervalSeconds: "1"
  MassTransit__MaxIntervalSeconds: "30"
  MassTransit__IntervalDeltaSeconds: "2"
