name: 🐳 Publish FcgNotifications Worker

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: 📦 Restore
        run: dotnet restore

      - name: 🔨 Build
        run: dotnet build --configuration Release --no-restore

      - name: 🧪 Run Tests
        run: dotnet test --configuration Release --no-build

      - name: 🐳 Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏷️ Get Version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: 🚀 Build & Push Notifications Worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./src/FcgNotifications.Worker/Dockerfile
          push: true
          tags: |
            jondamiao/fcg-notifications-worker:${{ env.VERSION }}
            jondamiao/fcg-notifications-worker:latest
